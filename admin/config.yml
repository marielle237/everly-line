backend:
  name: git-gateway
  branch: main
media_folder: assets/uploads
public_folder: /assets/uploads
collections:
    - name: produits
    label: Produits
    folder:"-produits"
    create: true
    slug: "{{slug}}"
    fields:
            - {label: Nom, name: title, widget: string}
            - {label: Prix, name: prix, widget: string}
            - {label: Taille, name: taille, widget: select, options: [S, M, L, XL, Unique]}
            - {label: Photo, name: image, widget: image}
            - {label: Description, name: description, widget: text}
